<!doctype html><html lang="it"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Bagni Stella</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f5efe6;font-family:Arial,sans-serif;padding-bottom:40px}
header{background:linear-gradient(135deg,#2e68b2,#0f2845);color:white;padding:18px 20px}
h1{font-family:Georgia,serif;margin:0;font-size:22px}
#login{padding:30px 20px;text-align:center}
#login input{width:100%;padding:14px;border:2px solid #2e68b2;border-radius:10px;font-size:18px;text-align:center;margin-bottom:12px}
#pannello{display:none;padding:20px}
.admin-cat{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#2e68b2;font-weight:700;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid #e8dfce}
.admin-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f0e8de}
.admin-row span{font-size:15px;color:#1a2332}
.toggle-wrap{position:relative;width:50px;height:28px;flex:0 0 auto}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute}
.slider{position:absolute;inset:0;background:#ccc;border-radius:28px;cursor:pointer;transition:.3s}
.slider:before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:white;border-radius:50%;transition:.3s}
.toggle-wrap input:checked + .slider{background:#c0392b}
.toggle-wrap input:checked + .slider:before{transform:translateX(22px)}
.btn{width:100%;border:0;border-radius:12px;padding:16px;font-size:17px;font-weight:800;cursor:pointer;margin-top:12px}
.btn-login{background:#2e68b2;color:white}
.btn-save{background:#2e68b2;color:white}
.btn-save.ok{background:#27ae60}
.apibox{background:#fff3cd;border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px}
.apibox input{width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;margin-top:6px;font-size:14px;font-family:monospace}
.msg{text-align:center;padding:10px;border-radius:8px;margin-top:10px;font-weight:700;display:none}
</style>
</head><body>
<header>
  <h1>&#x1F512; Admin &middot; Bagni Stella</h1>
  <p style="margin:4px 0 0;opacity:.8;font-size:13px">Gestione disponibilita prodotti</p>
</header>

<div id="login">
  <p style="color:#666;margin-bottom:16px">Inserisci la password per accedere</p>
  <input type="password" id="pwd" placeholder="Password" onkeydown="if(event.key==='Enter')accedi()">
  <button class="btn btn-login" onclick="accedi()">Accedi</button>
  <p id="err" style="color:#c0392b;display:none;margin-top:10px">Password errata</p>
</div>

<div id="pannello">
  <div class="apibox">
    <strong>&#x1F511; GitHub Token</strong><br>
    Inseriscilo una volta sola, viene salvato sul telefono.<br>
    <input type="password" id="gh-token" placeholder="ghp_...">
  </div>
  <div id="lista-prodotti"></div>
  <button class="btn btn-save" id="btn-save" onclick="salva()">&#x2714; Salva disponibilita</button>
  <div class="msg" id="msg"></div>
</div>

<script>
var PWD = "stella2026";
var OWNER = "nikorigini";
var REPO = "bagni-stella";
var FILE = "esauriti.json";
var API = "https://api.github.com/repos/" + OWNER + "/" + REPO + "/contents/" + FILE;
var esauritiAttuali = [];
var fileSha = "";

var PRODOTTI = [
  {cat:"Combo",id:"ps",nome:"Pausa Stella"},{cat:"Combo",id:"pl",nome:"Mangia Liguria"},{cat:"Combo",id:"prl",nome:"Pranzo Liguria"},{cat:"Combo",id:"as",nome:"Aperitivo Stella"},{cat:"Piattini",id:"pt5",nome:"Piattino dell'Oste"},{cat:"Piattini",id:"pt8",nome:"Piattino Speciale"},
  {cat:"Dolcezze",id:"mac",nome:"Macedonia"},{cat:"Dolcezze",id:"pan",nome:"Pancake"},{cat:"Dolcezze",id:"fru",nome:"Frullato + biscotto"},{cat:"Dolcezze",id:"crf",nome:"Crema Fredda"},{cat:"Dolcezze",id:"yog",nome:"Coppe Yogurt"},{cat:"Dolcezze",id:"cfs",nome:"Caffe Salentina"},{cat:"Dolcezze",id:"fag",nome:"Fagotto artigianale"},{cat:"Dolcezze",id:"can",nome:"Cannolo artigianale"},{cat:"Dolcezze",id:"str",nome:"Strudel"},{cat:"Dolcezze",id:"bud",nome:"Budini"},{cat:"Dolcezze",id:"big",nome:"Bis di Bigne"},{cat:"Dolcezze",id:"foc",nome:"Focaccia farcita"},
  {cat:"Caffe",id:"esp",nome:"Espresso"},{cat:"Caffe",id:"dec",nome:"Decaffeinato"},{cat:"Caffe",id:"cor",nome:"Corretto"},{cat:"Caffe",id:"ame",nome:"Americano caffe"},{cat:"Caffe",id:"mar",nome:"Marocchino"},{cat:"Caffe",id:"mcn",nome:"Marocchino Nocciola"},{cat:"Caffe",id:"mcp",nome:"Marocchino Pistacchio"},{cat:"Caffe",id:"op",nome:"Orzo piccolo"},{cat:"Caffe",id:"gp",nome:"Ginseng piccolo"},{cat:"Caffe",id:"gg",nome:"Ginseng grande"},{cat:"Caffe",id:"cap",nome:"Cappuccino"},{cat:"Caffe",id:"cad",nome:"Cappuccino dec"},{cat:"Caffe",id:"cao",nome:"Cappuccino orzo"},{cat:"Caffe",id:"lmp",nome:"Latte macchiato piccolo"},{cat:"Caffe",id:"lmg",nome:"Latte macchiato grande"},{cat:"Caffe",id:"lmv",nome:"Latte macchiato vegetale"},{cat:"Caffe",id:"teb",nome:"Te caldo"},{cat:"Caffe",id:"csh",nome:"Shakerato"},{cat:"Caffe",id:"csb",nome:"Shakerato Baileys"},
  {cat:"Panini",id:"pia",nome:"Piadina"},{cat:"Panini",id:"ris",nome:"Risacca"},{cat:"Panini",id:"tre",nome:"Trespolo"},{cat:"Panini",id:"bag",nome:"Bagnino"},{cat:"Panini",id:"can2",nome:"Canoa"},{cat:"Panini",id:"mol",nome:"Molo del Surf"},{cat:"Panini",id:"toa",nome:"Toast"},{cat:"Panini",id:"tr1",nome:"Tramezzino n.1"},
  {cat:"Insalatone",id:"ces",nome:"Cesare"},{cat:"Insalatone",id:"est",nome:"Estiva"},{cat:"Insalatone",id:"ton",nome:"Tonno Subito"},{cat:"Insalatone",id:"gre",nome:"Greca"},
  {cat:"Piatti Estivi",id:"cpb",nome:"Caprese di bufala"},{cat:"Piatti Estivi",id:"csg",nome:"Manzo cotto"},{cat:"Piatti Estivi",id:"tag",nome:"Taglieri misti"},{cat:"Piatti Estivi",id:"arn",nome:"Arancini"},{cat:"Piatti Estivi",id:"crp",nome:"Crepes artigianale"},
  {cat:"Cocktails",id:"neg",nome:"Negroni"},{cat:"Cocktails",id:"nsb",nome:"Negroni Sbagliato"},{cat:"Cocktails",id:"ame2",nome:"Americano drink"},{cat:"Cocktails",id:"mto",nome:"Milano-Torino"},{cat:"Cocktails",id:"spf",nome:"Spritz Fabbri"},{cat:"Cocktails",id:"spc",nome:"Spritz classico"},{cat:"Cocktails",id:"spb",nome:"SpritzBalim"},{cat:"Cocktails",id:"hug",nome:"Hugo"},{cat:"Cocktails",id:"moj",nome:"Mojito"},{cat:"Cocktails",id:"rum",nome:"Rum Cooler"},{cat:"Cocktails",id:"cai",nome:"Caipirinha"},{cat:"Cocktails",id:"pal",nome:"Paloma"},{cat:"Cocktails",id:"mmu",nome:"Moscow Mule"},{cat:"Cocktails",id:"mca",nome:"Mezza Carolina"},
  {cat:"Gin Tonic",id:"tan",nome:"Tanqueray"},{cat:"Gin Tonic",id:"bee",nome:"Beefeater"},{cat:"Gin Tonic",id:"bom",nome:"Bombay"},{cat:"Gin Tonic",id:"hay",nome:"Haymans"},{cat:"Gin Tonic",id:"mal",nome:"Malfy"},{cat:"Gin Tonic",id:"mpk",nome:"Malfy Pink"},{cat:"Gin Tonic",id:"pns",nome:"Panarea Sunset"},{cat:"Gin Tonic",id:"cit",nome:"Citadelle"},{cat:"Gin Tonic",id:"rok",nome:"Roku"},{cat:"Gin Tonic",id:"m47",nome:"Monkey 47"},
  {cat:"Birre",id:"ich",nome:"Ichnusa"},{cat:"Birre",id:"cor2",nome:"Corona"},{cat:"Birre",id:"bul",nome:"Bulldog"},{cat:"Birre",id:"for",nome:"Forst 0,0%"},{cat:"Birre",id:"ud4",nome:"Ud-40"},{cat:"Birre",id:"ara",nome:"Aradia"},{cat:"Birre",id:"zio",nome:"Zio Sam"},{cat:"Birre",id:"sun",nome:"Sunrise Project"},
  {cat:"Vini",id:"fal",nome:"Falerio"},{cat:"Vini",id:"trb",nome:"Trebbien"},{cat:"Vini",id:"trc",nome:"Trebbien calice"},{cat:"Vini",id:"rab",nome:"Raboso"},{cat:"Vini",id:"fri",nome:"Frizzi"},{cat:"Vini",id:"frc",nome:"Frizzi calice"},{cat:"Vini",id:"mez",nome:"Mezzelune"},{cat:"Vini",id:"mzc",nome:"Mezzelune calice"},{cat:"Vini",id:"unk",nome:"Unknown"},{cat:"Vini",id:"vpb",nome:"Poggio Bianco"},{cat:"Vini",id:"nav",nome:"Navel"},{cat:"Vini",id:"sot",nome:"Sottofondo"},{cat:"Vini",id:"chi",nome:"Chiarofiore"},{cat:"Vini",id:"gua",nome:"Guanciabianca"},{cat:"Vini",id:"gcc",nome:"Guanciabianca calice"},{cat:"Vini",id:"ndb",nome:"Note di Bianco"},{cat:"Vini",id:"aur",nome:"Aura"},{cat:"Vini",id:"sim",nome:"Simposio"},{cat:"Vini",id:"vit",nome:"Vitovska"},{cat:"Vini",id:"vtc",nome:"Vitovska calice"},{cat:"Vini",id:"len",nome:"Lentico"},{cat:"Vini",id:"pus",nome:"Pusole Bianco"},{cat:"Vini",id:"puc",nome:"Pusole calice"},
  {cat:"Bibite",id:"acq",nome:"Acqua"},{cat:"Bibite",id:"etl",nome:"Estathe limone"},{cat:"Bibite",id:"etp",nome:"Estathe pesca"},{cat:"Bibite",id:"cco",nome:"Coca Cola"},{cat:"Bibite",id:"ccz",nome:"Coca Cola Zero"},{cat:"Bibite",id:"fan",nome:"Fanta"},{cat:"Bibite",id:"rdb",nome:"Red Bull"},{cat:"Bibite",id:"suf",nome:"Succhi Frutta"},{cat:"Bibite",id:"smi",nome:"Succo Mirtillo"},{cat:"Bibite",id:"lim",nome:"Limonata"},{cat:"Bibite",id:"chi2",nome:"Chinotto"},{cat:"Bibite",id:"ton2",nome:"Acqua tonica"},{cat:"Bibite",id:"aal",nome:"Aranciata Lurisia"},{cat:"Bibite",id:"cro",nome:"Crodino XL"},{cat:"Bibite",id:"cso",nome:"Campari Soda"}
];

function accedi() {
  if (document.getElementById('pwd').value === PWD) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('err').style.display = 'none';
    var savedToken = localStorage.getItem('ghToken') || '';
    document.getElementById('gh-token').value = savedToken;
    caricaEApri();
  } else {
    document.getElementById('err').style.display = 'block';
  }
}

function caricaEApri() {
  fetch(API + '?t=' + Date.now(), {
    headers: {'Accept': 'application/vnd.github.v3+json'}
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    fileSha = d.sha || '';
    var content = atob(d.content.replace(/\n/g,''));
    var json = JSON.parse(content);
    esauritiAttuali = json.esauriti || [];
    renderLista();
    document.getElementById('pannello').style.display = 'block';
  })
  .catch(function(){
    esauritiAttuali = [];
    renderLista();
    document.getElementById('pannello').style.display = 'block';
  });
}

function renderLista() {
  var cat = '';
  var html = '';
  PRODOTTI.forEach(function(p) {
    if (p.cat !== cat) {
      cat = p.cat;
      html += '<div class="admin-cat">' + cat + '</div>';
    }
    var checked = esauritiAttuali.indexOf(p.id) !== -1 ? 'checked' : '';
    html += '<div class="admin-row"><span>' + p.nome + '</span>';
    html += '<label class="toggle-wrap"><input type="checkbox" id="t-' + p.id + '" ' + checked + '><span class="slider"></span></label></div>';
  });
  document.getElementById('lista-prodotti').innerHTML = html;
}

function salva() {
  var token = document.getElementById('gh-token').value.trim();
  if (!token) { alert('Inserisci il GitHub Token prima di salvare.'); return; }
  localStorage.setItem('ghToken', token);

  var nuovi = [];
  PRODOTTI.forEach(function(p) {
    var cb = document.getElementById('t-' + p.id);
    if (cb && cb.checked) nuovi.push(p.id);
  });

  var btn = document.getElementById('btn-save');
  btn.textContent = 'Salvataggio...';
  btn.disabled = true;

  var contenuto = JSON.stringify({esauriti: nuovi});
  var encoded = btoa(unescape(encodeURIComponent(contenuto)));

  var body = {
    message: 'Aggiorna esauriti',
    content: encoded,
    sha: fileSha
  };

  fetch(API, {
    method: 'PUT',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github.v3+json'
    },
    body: JSON.stringify(body)
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if (d.content && d.content.sha) {
      fileSha = d.content.sha;
      btn.textContent = '✔ Salvato!';
      btn.classList.add('ok');
      var msg = document.getElementById('msg');
      msg.textContent = nuovi.length === 0 ? 'Tutti i prodotti disponibili.' : nuovi.length + ' prodotti OGGI ASSENTE.';
      msg.style.display = 'block';
      msg.style.background = '#d4edda';
      msg.style.color = '#155724';
      setTimeout(function(){ btn.textContent = '✔ Salva disponibilita'; btn.classList.remove('ok'); btn.disabled = false; }, 2000);
    } else {
      throw new Error(JSON.stringify(d));
    }
  })
  .catch(function(e){
    alert('Errore: ' + e.message);
    btn.textContent = '✔ Salva disponibilita';
    btn.disabled = false;
  });
}
</script>
</body></html>
